<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BPS ベンチプレス管理</title>

  <!-- SEO & Web App Metadata -->
  <meta name="description" content="ベンチプレスのMAX重量向上をサポートする管理アプリ。1RMに基づきトレーニングメニューを自動計算。">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Library -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="app-shell">
    <!-- 背景ウォーターマーク -->
    <div class="app-watermark"
      style="position: fixed; top: 10%; left: 50%; transform: translate(-50%, -10%); opacity: 0.05; z-index: -1; pointer-events: none; width: 80%; max-width: 400px;">
      <img src="Blue_Angels_Insignia.svg.png" alt="Blue Angels Insignia Background" style="width: 100%; height: auto;">
    </div>

    <!-- ヘッダー -->
    <header class="app-header">
      <div class="header-content" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
        <img src="Blue_Angels_Insignia.svg.png" alt="Blue Angels Logo" style="width: 40px; height: 40px;">
        <div>
          <div class="app-title">POWER TRACKER</div>
          <div class="app-subtitle">Bench Press Max Development Program</div>
        </div>
      </div>

      <!-- MAX重量入力 -->
      <div class="max-weight-bar">
        <label for="max-weight-input">CURRENT MAX</label>
        <input type="number" id="max-weight-input" value="100" step="2.5" min="0" inputmode="decimal">
        <span class="unit">kg</span>
      </div>
    </header>

    <!-- タブナビゲーション -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="menu">メニュー</button>
      <button class="tab-btn" data-tab="progress">プログラム</button>
      <button class="tab-btn" data-tab="history">履歴</button>
      <button class="tab-btn" data-tab="chart">グラフ</button>
    </nav>

    <!-- タブコンテンツ: 今日のメニュー -->
    <main id="tab-menu" class="tab-content active">
      <div class="card">
        <div class="form-group">
          <label for="program-select">プログラム</label>
          <select id="program-select">
            <!-- プログラム一覧がJSで挿入される -->
          </select>
        </div>
        <div class="selector-row">
          <div class="form-group flex-1">
            <label for="week-select">週 (Week)</label>
            <select id="week-select">
              <!-- Week一覧がJSで挿入される -->
            </select>
          </div>
          <div class="form-group flex-1">
            <label for="day-select">日 (Day)</label>
            <select id="day-select">
              <!-- Day一覧がJSで挿入される -->
            </select>
          </div>
        </div>
      </div>

      <div class="section-title">Training Menu</div>
      <div id="menu-container">
        <!-- JSで動的に生成 -->
      </div>

      <button id="save-btn" class="btn-primary mt-16" onclick="saveWorkout()">
        <span>💾 実績を保存する</span>
      </button>
    </main>

    <!-- タブコンテンツ: プログラム全体 -->
    <section id="tab-progress" class="tab-content">
      <div class="section-title">Program Overview</div>
      <div id="progress-container">
        <!-- JSで動的に生成 -->
      </div>
    </section>

    <!-- タブコンテンツ: 履歴管理 -->
    <section id="tab-history" class="tab-content">
      <div class="section-title">Record History</div>
      <div class="history-controls">
        <button class="btn-secondary" onclick="toggleSelectAll()">全選択 / 解除</button>
        <button id="delete-selected-btn" class="btn-danger" style="display: none;" onclick="deleteSelected()">
          🗑️ 選択して削除
        </button>
      </div>
      <div id="history-list">
        <!-- JSで動的に生成 -->
      </div>
    </section>

    <!-- タブコンテンツ: グラフ -->
    <section id="tab-chart" class="tab-content">
      <div class="section-title">Progress Analysis</div>

      <div id="chart-empty" class="empty-state">
        <div class="icon">📈</div>
        <div class="message">
          履歴データが不足しています。<br>
          トレーニングを完了して実績を保存してください。
        </div>
      </div>

      <div id="chart-section" style="display: none;">
        <div class="chart-section">
          <h3>🏆 推定1RM 推移</h3>
          <div class="chart-container">
            <canvas id="maxWeightChart"></canvas>
          </div>
        </div>

        <div class="chart-section mt-16">
          <h3>📊 総負荷量 (Volume)</h3>
          <div class="chart-container">
            <canvas id="volumeChart"></canvas>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast"></div>

  <!-- Scripts -->
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/history.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/chart.js"></script>

</body>

</html>
